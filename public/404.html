<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Aristofersólio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/raleway.css">
    <style>
        :root {
            --bg: #F9F9F8;
            --ink: #0F1923;
            --accent: #1440D0;
            --mid: #5C6980;
            --border: #E0E5EE;
            --white: #FFFFFF;
            --gutter: clamp(24px, 5vw, 80px);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif; font-weight: 300;
            background: var(--bg); color: var(--ink);
            -webkit-font-smoothing: antialiased;
            min-height: 100svh; display: flex; flex-direction: column;
        }
        a { color: inherit; text-decoration: none; }

        /* Slim header */
        .head { padding: 30px var(--gutter) 0; }
        .head a {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px; font-weight: 500; letter-spacing: 0.02em;
        }

        /* Centered content */
        main {
            flex: 1; display: grid; place-items: center;
            padding: 40px var(--gutter) 80px; position: relative; overflow: hidden;
        }
        .inner { position: relative; z-index: 1; max-width: 620px; text-align: center; }
        .eyebrow {
            display: inline-flex; align-items: center; gap: 14px; margin-bottom: 30px;
            font-size: 11.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent);
        }
        .eyebrow::before, .eyebrow::after {
            content: ''; width: 28px; height: 1px; background: currentColor;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(40px, 6vw, 76px); font-weight: 300;
            line-height: 1.02; letter-spacing: -0.02em; margin-bottom: 26px;
        }
        h1 em { font-style: italic; color: var(--accent); }
        .sub {
            font-size: clamp(15px, 1.5vw, 17px); line-height: 1.8;
            color: var(--mid); max-width: 440px; margin: 0 auto 44px;
        }
        .actions {
            display: flex; gap: 22px; align-items: center; justify-content: center; flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-block; background: var(--ink); color: var(--white);
            padding: 15px 36px; font-size: 11.5px; letter-spacing: 0.12em;
            text-transform: uppercase; transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--accent); }
        .btn-ghost {
            display: inline-block; font-size: 13px; color: var(--mid);
            padding-bottom: 3px; border-bottom: 1px solid var(--border);
            transition: color 0.2s, border-color 0.2s;
        }
        .btn-ghost:hover { color: var(--ink); border-color: var(--ink); }

        /* Giant faint 404 watermark */
        .ghost-404 {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(280px, 52vw, 720px); font-weight: 300;
            line-height: 1; letter-spacing: -0.03em;
            color: transparent; -webkit-text-stroke: 1px var(--border);
            pointer-events: none; user-select: none; z-index: 0; white-space: nowrap;
        }
    </style>
</head>
<body>
    <header class="head">
        <a href="/">Aristofersólio</a>
    </header>
    <main>
        <div class="ghost-404" aria-hidden="true">404</div>
        <div class="inner">
            <p class="eyebrow">Error 404</p>
            <h1>This page has <em>wandered off</em></h1>
            <p class="sub">The link may be broken, or the page may have moved. Let's get you back to somewhere familiar.</p>
            <div class="actions">
                <a href="/" class="btn-primary">Back to Home</a>
                <a href="/our-services" class="btn-ghost">Our Services</a>
            </div>
        </div>
    </main>
</body>
</html>
