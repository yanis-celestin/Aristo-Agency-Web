<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Aristofersólio | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/font-override.css">
    <style>
        :root {
            --bg: #F9F9F8; --ink: #0F1923; --accent: #1440D0;
            --mid: #5C6980; --border: #E0E5EE; --white: #FFFFFF;
            --gutter: clamp(24px, 5vw, 80px);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif; font-weight: 300;
            background: var(--bg); color: var(--ink);
            -webkit-font-smoothing: antialiased;
            min-height: 100svh; display: flex; flex-direction: column;
        }
        a { color: inherit; text-decoration: none; }
        .head { padding: 30px var(--gutter) 0; }
        .head a {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px; font-weight: 500; letter-spacing: 0.02em;
        }
        main {
            flex: 1; display: grid; place-items: center;
            padding: 40px var(--gutter) 80px; text-align: center;
        }
        .eyebrow {
            display: inline-flex; align-items: center; gap: 14px; margin-bottom: 30px;
            font-size: 11.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent);
        }
        .eyebrow::before, .eyebrow::after {
            content: ''; width: 28px; height: 1px; background: currentColor;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(44px, 6.5vw, 84px); font-weight: 300;
            line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 26px;
        }
        h1 em { font-style: italic; color: var(--accent); }
        .sub {
            font-size: clamp(15px, 1.5vw, 17px); line-height: 1.8;
            color: var(--mid); max-width: 420px; margin: 0 auto 40px;
        }
        .email {
            display: inline-block; font-family: 'Cormorant Garamond', serif;
            font-size: clamp(22px, 3vw, 32px); color: var(--accent);
            border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 44px;
            transition: border-color 0.2s;
        }
        .email:hover { border-color: var(--accent); }
        .btn-primary {
            display: block; width: fit-content; margin: 0 auto;
            background: var(--ink); color: var(--white);
            padding: 15px 36px; font-size: 11.5px; letter-spacing: 0.12em;
            text-transform: uppercase; transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--accent); }
    </style>
</head>
<body>
    <header class="head">
        <a href="/">Aristofersólio</a>
    </header>
    <main>
        <div>
            <p class="eyebrow">Contact</p>
            <h1>Work in <em>progress</em></h1>
            <p class="sub">Our full contact page is coming soon. In the meantime, we'd love to hear from you:</p>
            <a href="mailto:help@aristofersolio.com" class="email">help@aristofersolio.com</a>
            <a href="/" class="btn-primary">Back to Home</a>
        </div>
    </main>
</body>
</html>
